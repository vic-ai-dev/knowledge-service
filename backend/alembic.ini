[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
# sqlalchemy.url is placeholder — overridden in env.py from settings.yaml
sqlalchemy.url = placeholder
file_template = %%(rev)s_%%(slug)s
timezone = Asia/Shanghai
truncate_slug_length = 40
sourceless = false
version_locations = %(here)s/alembic/versions
path_separator = os
[post_write_hooks]
[loggers]
keys = root,sqlalchemy,alembic
[handlers]
keys = console
[formatters]
keys = generic
[logger_root]
level = WARNING
handlers = console
qualname =
[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine
[logger_alembic]
level = INFO
handlers =
qualname = alembic
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
